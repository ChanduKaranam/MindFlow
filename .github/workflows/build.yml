name: build
on: [push, pull_request]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app
    env:
      # Some vendored cmake projects (whisper.cpp) trip newer CMake's policy floor on macOS.
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      # CPU-only build: whisper.cpp (CPU) via whisper-rs needs cmake + libclang (bindgen);
      # the rest are Tauri/enigo/gtk-layer-shell/alsa runtime+build deps. No Vulkan/GPU SDK.
      - name: Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libssl-dev cmake libclang-dev \
            libasound2-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libgtk-layer-shell0 libgtk-layer-shell-dev \
            libxdo-dev patchelf
      - run: bun install
      - run: cd src-tauri && cargo check
