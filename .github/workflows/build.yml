name: build
on: [push, pull_request]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      # whisper.cpp vendored Vulkan backend + bindgen require these extra packages
      - name: Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libxdo-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            build-essential pkg-config cmake libclang-dev glslc libvulkan-dev
      - run: bun install
      - run: cd src-tauri && cargo check
